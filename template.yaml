AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Document Intelligence Platform FastAPI on AWS Lambda

Globals:
  Function:
    Runtime: python3.12
    Timeout: 120
    MemorySize: 1024
    Architectures:
      - x86_64

Parameters:
  SupabaseUrl:
    Type: String
  SupabaseKey:
    Type: String
    NoEcho: true
  SupabaseServiceKey:
    Type: String
    NoEcho: true
    Default: ""
  OpenAIApiKey:
    Type: String
    NoEcho: true
    Default: ""

Resources:
  TextractBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "di-platform-textract-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: DeleteTempFiles
            Status: Enabled
            ExpirationInDays: 1

  DiPlatformApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: di-platform-api
      CodeUri: .
      Handler: lambda_handler.handler
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_KEY: !Ref SupabaseKey
          SUPABASE_SERVICE_KEY: !Ref SupabaseServiceKey
          OPENAI_API_KEY: !Ref OpenAIApiKey
          TEXTRACT_S3_BUCKET: !Ref TextractBucket
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - textract:StartDocumentTextDetection
                - textract:GetDocumentTextDetection
              Resource: "*"
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
                - s3:DeleteObject
              Resource: !Sub "arn:aws:s3:::di-platform-textract-${AWS::AccountId}/*"
      Events:
        RootProxy:
          Type: Api
          Properties:
            Path: /
            Method: ANY
        GreedyProxy:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
