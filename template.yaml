AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Document Intelligence Platform FastAPI on AWS Lambda

Globals:
  Function:
    Runtime: python3.12
    Timeout: 60
    MemorySize: 1024
    Architectures:
      - x86_64

Parameters:
  SupabaseUrl:
    Type: String
  SupabaseKey:
    Type: String
    NoEcho: true
  SupabaseServiceKey:
    Type: String
    NoEcho: true
    Default: ""
  OpenAIApiKey:
    Type: String
    NoEcho: true
    Default: ""

Resources:
  DiPlatformApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: lambda_handler.handler
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_KEY: !Ref SupabaseKey
          SUPABASE_SERVICE_KEY: !Ref SupabaseServiceKey
          OPENAI_API_KEY: !Ref OpenAIApiKey
      Events:
        RootProxy:
          Type: Api
          Properties:
            Path: /
            Method: ANY
        GreedyProxy:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
